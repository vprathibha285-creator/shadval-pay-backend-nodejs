html<!DOCTYPE html>
<html>
<head>
  <title>Verify OTP — ShadVal Pay</title>
</head>
<body>

<h2>Verify OTP</h2>
<p>OTP sent to: <strong id="sentTo"></strong></p>

<input type="text" id="otp" placeholder="Enter 6-digit OTP" maxlength="6"><br><br>

<button onclick="verifyOTP()">Verify & Register</button>
<p id="msg"></p>

<script>
  // ✅ Show where OTP was sent
  const emailOrMobile = localStorage.getItem("emailOrMobile");
  document.getElementById("sentTo").textContent = emailOrMobile || "your email/mobile";

  if (!emailOrMobile) {
    alert("Session expired. Please register again.");
    window.location.href = "register.html";
  }

async function verifyOTP() {
  const otp = document.getElementById("otp").value.trim();

  if (!otp || otp.length !== 6) {
    alert("Please enter the 6-digit OTP");
    return;
  }

  const response = await fetch("/api/auth/verify-otp", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ emailOrMobile, otp })
  });

  const data = await response.json();

  if (response.ok) {
    // ✅ OTP verified — user saved in database
    alert("Registration Successful ✅ Please login now");
    localStorage.removeItem("emailOrMobile");
    window.location.href = "login.html";
  } else {
    alert("Error: " + data.message);
  }
}
</script>
</body>
</html>
