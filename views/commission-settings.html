<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Commission Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background: #f3f4f6; }

    .header { background: linear-gradient(135deg, #7c3aed, #9f67f5); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .header-left .sub { color: rgba(255,255,255,0.75); font-size: 13px; margin-bottom: 4px; }
    .header-left h1   { color: #fff; font-size: 22px; font-weight: 600; }
    .btn-refresh-header { background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.4); border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; }
    .btn-refresh-header:hover { background: rgba(255,255,255,0.3); }

    .page { padding: 1.5rem; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }

    /* ── GLOBAL COMMISSION CARD ── */
    .global-card {
      background: #fff; border-radius: 16px; border: 1px solid #e5e7eb;
      padding: 2rem; text-align: center;
    }
    .global-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: #ede9fe; margin: 0 auto 1rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .global-label { font-size: 13px; color: #6b7280; font-weight: 500; margin-bottom: 6px; }
    .global-value { font-size: 48px; font-weight: 700; color: #7c3aed; line-height: 1; margin-bottom: 6px; }
    .global-type  { font-size: 13px; color: #9ca3af; margin-bottom: 1.5rem; }

    .applies-to { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .type-pill {
      background: #f3f4f6; border: 1px solid #e5e7eb;
      border-radius: 99px; padding: 4px 12px; font-size: 12px; color: #374151; font-weight: 500;
    }

    .btn-edit-global {
      background: #7c3aed; color: #fff; border: none;
      border-radius: 10px; padding: 10px 28px;
      font-size: 14px; font-weight: 500; cursor: pointer;
    }
    .btn-edit-global:hover { background: #6d28d9; }

    /* ── EDIT FORM ── */
    .edit-card {
      background: #fff; border-radius: 16px; border: 2px solid #7c3aed;
      padding: 1.5rem; display: none;
    }
    .edit-card.open { display: block; }
    .edit-title { font-size: 15px; font-weight: 700; color: #111827; margin-bottom: 1.25rem; }

    .edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .field label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 5px; font-weight: 500; }
    .field select, .field input {
      width: 100%; height: 42px; padding: 0 12px;
      border: 1px solid #d1d5db; border-radius: 8px;
      background: #f9fafb; font-size: 14px; color: #111827; outline: none;
    }
    .field input.error { border-color: #ef4444; }
    .field select:focus, .field input:focus { border-color: #7c3aed; box-shadow: 0 0 0 2px rgba(124,58,237,0.12); }
    .err-msg { font-size: 11px; color: #ef4444; margin-top: 3px; display: none; }

    .notice {
      background: #fef9c3; border: 1px solid #fde68a; border-radius: 8px;
      padding: 10px 14px; font-size: 12px; color: #92400e; margin-bottom: 1rem;
    }

    .edit-actions { display: flex; gap: 0.75rem; }
    .btn-save { flex: 1; height: 42px; background: #7c3aed; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-save:hover { background: #6d28d9; }
    .btn-save:disabled { background: #a78bfa; cursor: not-allowed; }
    .btn-cancel { height: 42px; background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; border-radius: 8px; padding: 0 20px; font-size: 14px; cursor: pointer; }

    /* ── HISTORY ── */
    .card { background: #fff; border-radius: 12px; border: 1px solid #e5e7eb; padding: 1.5rem; }
    .card-title { font-size: 15px; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px solid #e5e7eb; color: #111827; }

    .history-filters { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .history-filters select, .history-filters input {
      height: 34px; padding: 0 10px; border: 1px solid #d1d5db;
      border-radius: 8px; font-size: 13px; background: #fff; color: #111827; outline: none; flex: 1; min-width: 120px;
    }
    .btn-filter { height: 34px; background: #7c3aed; color: #fff; border: none; border-radius: 8px; padding: 0 16px; font-size: 13px; cursor: pointer; }
    .btn-filter:hover { background: #6d28d9; }
    .btn-clear  { height: 34px; background: #f3f4f6; color: #374151; border: 1px solid #d1d5db; border-radius: 8px; padding: 0 14px; font-size: 13px; cursor: pointer; }

    .summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.75rem; margin-bottom: 1rem; }
    .summary-card { background: #f9fafb; border-radius: 10px; padding: 0.75rem 1rem; border: 1px solid #e5e7eb; }
    .summary-card .s-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; font-weight: 500; }
    .summary-card .s-value { font-size: 16px; font-weight: 700; color: #111827; }

    .history-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.9rem 0; border-bottom: 1px solid #f3f4f6;
    }
    .history-item:last-child { border-bottom: none; padding-bottom: 0; }
    .h-icon { width: 38px; height: 38px; border-radius: 50%; background: #ede9fe; display: flex; align-items: center; justify-content: center; font-size: 13px; color: #7c3aed; font-weight: 700; flex-shrink: 0; }
    .h-info { flex: 1; min-width: 0; }
    .h-names { font-size: 13px; font-weight: 600; color: #111827; }
    .h-meta  { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .h-right { text-align: right; flex-shrink: 0; }
    .h-amount { font-size: 14px; font-weight: 700; color: #16a34a; }
    .h-earned { display: inline-block; margin-top: 3px; background: #dcfce7; color: #166534; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }

    .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
    .page-btn { height: 32px; min-width: 32px; padding: 0 10px; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; color: #374151; }
    .page-btn.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
    .page-btn:hover:not(.active) { background: #f3f4f6; }

    .empty       { text-align: center; padding: 2rem; color: #9ca3af; font-size: 14px; }
    .error-state { text-align: center; padding: 1rem; color: #ef4444; font-size: 13px; }

    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #7c3aed; color: #fff; padding: 10px 18px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.err { background: #ef4444; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="sub">Super Admin</div>
    <h1>Commission Settings</h1>
  </div>
  <button class="btn-refresh-header" onclick="init()">⟳ Refresh</button>
</div>

<div class="page">

  <!-- ── GLOBAL COMMISSION DISPLAY ── -->
  <div class="global-card" id="globalCard">
    <div class="global-icon">%</div>
    <div class="global-label">Global Commission Rate</div>
    <div class="global-value" id="g-value">--</div>
    <div class="global-type"  id="g-type">Loading...</div>
    <div class="applies-to" id="g-types"></div>
    <button class="btn-edit-global" onclick="openEdit()">✏️ Edit Commission</button>
  </div>

  <!-- ── EDIT FORM ── -->
  <div class="edit-card" id="editCard">
    <div class="edit-title">Update Global Commission</div>
    <div class="notice">⚠️ This will update commission for <strong>all transaction types</strong> at once.</div>
    <div class="edit-row">
      <div class="field">
        <label>Commission Type</label>
        <select id="e-type">
          <option value="percentage">Percentage (%)</option>
          <option value="flat">Flat Rs.</option>
        </select>
      </div>
      <div class="field">
        <label>Value</label>
        <input type="number" id="e-val" step="0.01" min="0" placeholder="e.g. 2.5" />
        <div class="err-msg" id="e-val-err">Enter a valid value.</div>
      </div>
    </div>
    <div class="edit-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="saveGlobal()">Save Changes</button>
    </div>
  </div>

  <!-- ── COMMISSION HISTORY ── -->
  <div class="card">
    <div class="card-title">Commission History</div>

    <div class="history-filters">
      <input type="date" id="h-from" />
      <input type="date" id="h-to"   />
      <button class="btn-filter" onclick="loadHistory(1)">Filter</button>
      <button class="btn-clear"  onclick="clearFilters()">Clear</button>
    </div>

    <div class="summary-row" id="historySummary" style="display:none;">
      <div class="summary-card">
        <div class="s-label">Total Records</div>
        <div class="s-value" id="s-records">0</div>
      </div>
      <div class="summary-card">
        <div class="s-label">Total Amount</div>
        <div class="s-value" id="s-amount">Rs.0</div>
      </div>
      <div class="summary-card">
        <div class="s-label">Commission Earned</div>
        <div class="s-value" id="s-commission">Rs.0</div>
      </div>
    </div>

    <div id="historyList"><div class="empty">Loading...</div></div>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const BASE  = '/api/admin-management';
  const TOKEN = localStorage.getItem('token') || sessionStorage.getItem('token') || '';
  const LIMIT = 10;
  let currentPage = 1;

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` };
  }

  const TYPE_LABELS = {
    transfer:    '⇄ Transfer',
    settlement:  '➤ Settlement',
    wallet_load: '🪙 Wallet Load',
    payment:     '💳 Payment',
    refund:      '↩️ Refund',
  };

  // ── INIT ──
  function init() {
    loadGlobal();
    loadHistory(1);
  }

  // ── LOAD GLOBAL COMMISSION ──
  async function loadGlobal() {
    try {
      const res  = await fetch(`${BASE}/commission-settings`, { headers: authHeaders() });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);

      const data = json.data;
      if (!data.length) return;

      // Use first row's type/value as the "global" display
      const first = data[0];
      document.getElementById('g-value').textContent =
        first.commission_type === 'flat'
          ? `Rs.${parseFloat(first.commission_value).toFixed(2)}`
          : `${parseFloat(first.commission_value).toFixed(2)}%`;

      document.getElementById('g-type').textContent =
        first.commission_type === 'flat' ? 'Flat Rate' : 'Percentage Rate';

      // Show all types this applies to
      document.getElementById('g-types').innerHTML = data.map(r =>
        `<span class="type-pill">${TYPE_LABELS[r.transaction_type] || r.transaction_type}</span>`
      ).join('');

      // Pre-fill edit form
      document.getElementById('e-type').value = first.commission_type;
      document.getElementById('e-val').value  = parseFloat(first.commission_value);

    } catch(e) {
      document.getElementById('g-value').textContent = 'Error';
      document.getElementById('g-type').textContent  = e.message;
    }
  }

  // ── OPEN / CLOSE EDIT ──
  function openEdit() {
    document.getElementById('editCard').classList.add('open');
    document.getElementById('editCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function closeEdit() {
    document.getElementById('editCard').classList.remove('open');
    document.getElementById('e-val').classList.remove('error');
    document.getElementById('e-val-err').style.display = 'none';
  }

  // ── SAVE GLOBAL (updates ALL rows) ──
  async function saveGlobal() {
    const commission_type  = document.getElementById('e-type').value;
    const rawVal           = document.getElementById('e-val').value;
    const commission_value = parseFloat(rawVal);

    document.getElementById('e-val').classList.remove('error');
    document.getElementById('e-val-err').style.display = 'none';

    if (rawVal === '' || isNaN(commission_value) || commission_value < 0) {
      document.getElementById('e-val').classList.add('error');
      document.getElementById('e-val-err').style.display = 'block';
      return;
    }
    if (commission_type === 'percentage' && commission_value > 100) {
      showToast('Percentage cannot exceed 100.', true); return;
    }

    const btn = document.getElementById('btn-save');
    btn.disabled    = true;
    btn.textContent = 'Saving...';

    try {
      const res  = await fetch(`${BASE}/commission-settings/global/update`, {
        method:  'PUT',
        headers: authHeaders(),
        body:    JSON.stringify({ commission_type, commission_value })
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);
      closeEdit();
      showToast(`✅ ${json.message}`);
      loadGlobal();
    } catch(e) {
      showToast(e.message || 'Update failed.', true);
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Save Changes';
    }
  }

  // ── LOAD HISTORY ──
  async function loadHistory(page) {
    currentPage = page || 1;
    document.getElementById('historyList').innerHTML = '<div class="empty">Loading...</div>';

    const from_date = document.getElementById('h-from').value;
    const to_date   = document.getElementById('h-to').value;

    const params = new URLSearchParams({ page: currentPage, limit: LIMIT });
    if (from_date) params.append('from_date', from_date);
    if (to_date)   params.append('to_date',   to_date);

    try {
      const res  = await fetch(`${BASE}/commission-history?${params}`, { headers: authHeaders() });
      const json = await res.json();
      if (!json.success) throw new Error(json.message);

      const s = json.summary;
      document.getElementById('historySummary').style.display = 'grid';
      document.getElementById('s-records').textContent    = s.total_records;
      document.getElementById('s-amount').textContent     = `Rs.${parseFloat(s.total_transaction_amount).toFixed(2)}`;
      document.getElementById('s-commission').textContent = `Rs.${parseFloat(s.total_commission_earned).toFixed(2)}`;

      renderHistory(json.data);
      renderPagination(json.pagination);
    } catch(e) {
      document.getElementById('historyList').innerHTML = `<div class="error-state">Error: ${e.message}</div>`;
    }
  }

  function renderHistory(data) {
    const el = document.getElementById('historyList');
    if (!data.length) { el.innerHTML = '<div class="empty">No history found.</div>'; return; }
    el.innerHTML = data.map(r => `
      <div class="history-item">
        <div class="h-icon">%</div>
        <div class="h-info">
          <div class="h-names">${r.sender_name || 'N/A'} → ${r.receiver_name || 'N/A'}</div>
          <div class="h-meta">${r.transaction_type} • ${(r.created_at || '').toString().split('T')[0]}</div>
          <div class="h-meta">Amount: Rs.${parseFloat(r.transaction_amount || 0).toFixed(2)}</div>
        </div>
        <div class="h-right">
          <div class="h-amount">Rs.${parseFloat(r.commission_earned || 0).toFixed(2)}</div>
          <span class="h-earned">Earned</span>
        </div>
      </div>
    `).join('');
  }

  function renderPagination(p) {
    const el = document.getElementById('pagination');
    if (!p || p.total_pages <= 1) { el.innerHTML = ''; return; }
    let html = '';
    if (p.page > 1) html += `<button class="page-btn" onclick="loadHistory(${p.page - 1})">← Prev</button>`;
    for (let i = 1; i <= p.total_pages; i++) {
      html += `<button class="page-btn ${i === p.page ? 'active':''}" onclick="loadHistory(${i})">${i}</button>`;
    }
    if (p.page < p.total_pages) html += `<button class="page-btn" onclick="loadHistory(${p.page + 1})">Next →</button>`;
    el.innerHTML = html;
  }

  function clearFilters() {
    document.getElementById('h-from').value = '';
    document.getElementById('h-to').value   = '';
    loadHistory(1);
  }

  function showToast(msg, isErr = false) {
    const t = document.getElementById('toast');
    t.textContent   = msg;
    t.className     = 'toast' + (isErr ? ' err' : '');
    t.style.opacity = '1';
    setTimeout(() => t.style.opacity = '0', 2500);
  }

  init();
</script>
</body>
</html>
